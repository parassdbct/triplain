_schema-version: "3.1"
ID: trip-app
description: Trip App - TripPin OData + HANA Cloud
version: 1.0.0
modules:
- name: trip-app-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: trip-app-db
  - name: trip-app-xsuaa
  - name: trip-app-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpacks:
    - nodejs_buildpack
    disk-quota: 512M
    memory: 256M
- name: trip-app-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: trip-app-db
  parameters:
    disk-quota: 512M
    memory: 256M
- name: trip-app-approuter
  type: approuter.nodejs
  path: approuter
  requires:
  - name: trip-app-xsuaa
  - name: trip-app-html5-runtime
  - name: trip-app-destination
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  parameters:
    disk-quota: 512M
    memory: 256M
- name: trip-app-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: trip-app-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - people.zip
      name: people
      target-path: resources/
- name: people
  type: html5
  path: app/people
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: trip-app-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: trip-app-xsuaa
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: trip-app-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime
- name: trip-app-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
- name: trip-app-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: trip-app-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
