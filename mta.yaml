_schema-version: '3.1'
ID: trip-app
version: 1.0.0
description: Trip App - TripPin OData + HANA Cloud

modules:

# ─────────────────────────────
# CAP Backend Service
# ─────────────────────────────
- name: trip-app-srv
  type: nodejs
  path: gen/srv
  requires:
    - name: trip-app-db
    - name: trip-app-xsuaa
  provides:
    - name: srv-api
      properties:
        srv-url: ${default-url}
  parameters:
    buildpacks:
      - nodejs_buildpack
    memory: 256M
    disk-quota: 512M

# ─────────────────────────────
# HANA DB Deployer
# Deploys schema to HANA Cloud
# ─────────────────────────────
- name: trip-app-db-deployer
  type: hdb
  path: gen/db
  requires:
    - name: trip-app-db
  parameters:
    memory: 256M
    disk-quota: 512M

# ─────────────────────────────
# App Router
# Handles login + routing
# ─────────────────────────────
- name: trip-app-approuter
  type: approuter.nodejs
  path: approuter
  requires:
    - name: trip-app-xsuaa
    - name: trip-app-html5-runtime
    - name: srv-api
      group: destinations
      properties:
        name            : srv-api
        url             : ~{srv-url}
        forwardAuthToken: true
  parameters:
    memory    : 256M
    disk-quota: 512M

resources:

# ─────────────────────────────
# HANA Cloud HDI Container
# ─────────────────────────────
- name: trip-app-db
  type: com.sap.xs.hdi-container
  parameters:
    service     : hana
    service-plan: hdi-shared

# ─────────────────────────────
# XSUAA Security Service
# ─────────────────────────────
- name: trip-app-xsuaa
  type: org.cloudfoundry.managed-service
  parameters:
    service     : xsuaa
    service-plan: application
    path        : ./xs-security.json

# ─────────────────────────────
# HTML5 Apps Repo Runtime
# ─────────────────────────────
- name: trip-app-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service     : html5-apps-repo
    service-plan: app-runtime
